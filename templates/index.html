<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Entry — RxShield</title>
    {% include 'styles.html' %}
</head>
<body>
{% include 'navbar.html' %}

<div class="container">

    <!-- Order Entry Card -->
    <div class="card">
        <h2>🔍 Medication Order Entry</h2>
        <p class="subtitle">Select a patient and enter a medication order to run safety checks</p>

        <!-- Patient Dropdown -->
        <div class="form-group">
            <label>Select Patient</label>
            <select id="patient-select" onchange="showPatientInfo()">
                <option value="">— Select a Patient —</option>
                {% for p in patients %}
                <option value="{{ p['patient_id'] }}"
                        data-age="{{ p['age'] }}"
                        data-gender="{{ p['gender'] }}"
                        data-condition="{{ p['condition'] }}"
                        data-drug="{{ p['current_drug'] }}"
                        data-allergy="{{ p['allergy_class'] }}">
                    {{ p['patient_id'] }} — Age {{ p['age'] }}, {{ p['gender'] }}, {{ p['condition'] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Patient Info Box -->
        <div id="patient-info">
            <p><strong>Current Medication:</strong> <span id="info-drug"></span></p>
            <p><strong>Allergy Class:</strong> <span id="info-allergy"></span></p>
            <p><strong>Condition:</strong> <span id="info-condition"></span></p>
            <p><strong>Age / Gender:</strong> <span id="info-age"></span></p>
        </div>

        <!-- Drug Dropdown -->
        <div class="form-group">
            <label>Drug to Order</label>
            <select id="ordered-drug">
                <option value="">— Select a Drug —</option>
                {% for drug in drugs %}
                <option value="{{ drug }}">{{ drug }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Dose -->
        <div class="form-group">
            <label>Dose (mg)</label>
            <input type="number" id="ordered-dose" placeholder="e.g. 500" min="1">
        </div>

        <button class="btn btn-primary" onclick="submitOrder()" id="submitBtn">
            🔍 Check & Submit Order
        </button>

        <!-- Result -->
        <div id="result">
            <h3 id="result-title"></h3>
            <div id="result-alerts"></div>
        </div>
    </div>
</div>

<script>
function showPatientInfo() {
    const select  = document.getElementById('patient-select');
    const option  = select.options[select.selectedIndex];
    const infoBox = document.getElementById('patient-info');
    if (!select.value) { infoBox.style.display = 'none'; return; }
    document.getElementById('info-drug').textContent      = option.dataset.drug;
    document.getElementById('info-allergy').textContent   = option.dataset.allergy;
    document.getElementById('info-condition').textContent = option.dataset.condition;
    document.getElementById('info-age').textContent       = option.dataset.age + ' yrs, ' + option.dataset.gender;
    infoBox.style.display = 'block';
}

async function submitOrder() {
    const patientId   = document.getElementById('patient-select').value;
    const orderedDrug = document.getElementById('ordered-drug').value;
    const orderedDose = document.getElementById('ordered-dose').value;
    const btn         = document.getElementById('submitBtn');

    if (!patientId || !orderedDrug || !orderedDose) {
        alert('Please fill in all fields!'); return;
    }

    btn.textContent = '⏳ Checking...';
    btn.disabled    = true;

    const response = await fetch('/check-order', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ patient_id: patientId, ordered_drug: orderedDrug, ordered_dose: orderedDose })
    });

    const data = await response.json();
    showResult(data);

    btn.textContent = '🔍 Check & Submit Order';
    btn.disabled    = false;
}

function showResult(data) {
    const resultBox    = document.getElementById('result');
    const resultTitle  = document.getElementById('result-title');
    const resultAlerts = document.getElementById('result-alerts');

    resultBox.className     = data.status;
    resultTitle.textContent = data.message;
    resultAlerts.innerHTML  = '';
    resultBox.style.display = 'block';

    if (data.alerts && data.alerts.length > 0) {
        data.alerts.forEach(alert => {
            const div     = document.createElement('div');
            div.className = 'alert-item';
            div.innerHTML = `<strong>${alert.type}</strong>${alert.message}`;
            resultAlerts.appendChild(div);
        });
    }
    resultBox.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
