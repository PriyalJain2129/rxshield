<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — RxShield</title>
    {% include 'styles.html' %}
</head>
<body>
<div class="auth-bg">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-icon" style="background:none; border:none; padding:0;"><svg width="34" height="34" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="20" fill="#1E7F8C"/><rect x="47" y="8" width="6" height="84" rx="3" fill="white"/><path d="M50 22 C35 16 18 20 12 28 C20 24 35 26 50 32 Z" fill="white"/><path d="M50 22 C65 16 82 20 88 28 C80 24 65 26 50 32 Z" fill="white"/><path d="M50 30 C38 33 34 40 40 47 C46 54 42 61 34 63" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M50 30 C62 33 66 40 60 47 C54 54 58 61 66 63" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="33" cy="65" r="4" fill="white"/><circle cx="67" cy="65" r="4" fill="white"/><circle cx="50" cy="10" r="5" fill="#63C9D6"/></svg></div>
            <h1>Create Account</h1>
            <p>Join RxShield System</p>
        </div>

        <button class="google-btn" onclick="googleNotice()">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.6 13 17.9 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8C43.8 37.3 46.5 31.3 46.5 24.5z"/>
                <path fill="#FBBC05" d="M10.8 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.7l8.3-6z"/>
                <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-4.1-13.2-9.7l-8.3 6C6.9 42.6 14.8 48 24 48z"/>
            </svg>
            Sign up with Google
        </button>

        <div class="auth-divider">or sign up with email</div>

        <div class="error-msg"   id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Dr. Priya Sharma">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="doctor@hospital.com">
        </div>

        <div class="form-group">
            <label>Role</label>
            <select id="role">
                <option value="Doctor">Doctor</option>
                <option value="Pharmacist">Pharmacist</option>
                <option value="Nurse">Nurse</option>
                <option value="Admin">Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="At least 6 characters">
                <button class="toggle-pw" onclick="togglePw('password', this)">👁</button>
            </div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrap">
                <input type="password" id="confirm" placeholder="Repeat password"
                       onkeydown="if(event.key==='Enter') signupUser()">
                <button class="toggle-pw" onclick="togglePw('confirm', this)">👁</button>
            </div>
        </div>

        <button class="btn btn-primary" onclick="signupUser()" id="signupBtn">
            Create Account
        </button>

        <div class="auth-footer" style="margin-top:16px;">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>

<script>
function togglePw(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁'; }
}

function googleNotice() {
    showError('Google login requires OAuth setup. Please use email signup for now.');
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
}

async function signupUser() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const role     = document.getElementById('role').value;
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('signupBtn');

    if (!name || !email || !password || !confirm) { showError('All fields are required.'); return; }
    if (password !== confirm) { showError('Passwords do not match.'); return; }
    if (password.length < 6)  { showError('Password must be at least 6 characters.'); return; }

    btn.textContent = 'Creating account...';
    btn.disabled    = true;

    const res  = await fetch('/api/signup', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ name, email, password, role })
    });
    const data = await res.json();

    if (data.status === 'success') {
        showSuccess(data.message + ' Redirecting...');
        setTimeout(() => window.location.href = '/', 1000);
    } else {
        showError(data.message);
        btn.textContent = 'Create Account';
        btn.disabled    = false;
    }
}
</script>
</body>
</html>
