<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
/* ── Color Palette ─────────────────────────────────────────────── */
:root {
    --c1: #EAF7FB;   /* lightest — backgrounds */
    --c2: #BFEAF2;   /* light blue — hover, borders */
    --c3: #63C9D6;   /* mid teal — accents */
    --c4: #1E7F8C;   /* deep teal — primary */
    --c5: #20343A;   /* darkest — text, navbar */

    --danger : #e74c3c;
    --warning : #f39c12;
    --success : #27ae60;
    --white   : #ffffff;
    --gray    : #f4f7f9;
    --text    : #20343A;
    --subtext : #6b8a91;

    --radius  : 12px;
    --shadow  : 0 4px 24px rgba(30, 127, 140, 0.10);
    --shadow-lg: 0 8px 40px rgba(30, 127, 140, 0.16);
}

/* ── Reset ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--c1);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
}

/* ── Navbar ────────────────────────────────────────────────────── */
nav {
    background: var(--c5);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
}

.nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--white);
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    text-decoration: none;
    letter-spacing: 0.3px;
}

.nav-brand svg {
    filter: drop-shadow(0 2px 6px rgba(99,201,214,0.4));
    transition: transform 0.2s;
}
.nav-brand:hover svg { transform: rotate(-8deg) scale(1.08); }

.nav-links {
    display: flex;
    align-items: center;
    gap: 4px;
}

.nav-links a {
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    padding: 7px 13px;
    border-radius: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.nav-links a:hover { background: rgba(99,201,214,0.15); color: var(--c3); }
.nav-links a.active { background: rgba(99,201,214,0.2); color: var(--c3); }

/* Profile dropdown */
.nav-profile {
    position: relative;
    margin-left: 8px;
}

.profile-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    background: rgba(99,201,214,0.15);
    border: 1px solid rgba(99,201,214,0.3);
    color: var(--white);
    padding: 7px 14px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
}

.profile-btn:hover { background: rgba(99,201,214,0.25); }

.profile-avatar {
    width: 30px; height: 30px;
    background: var(--c4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
}

.profile-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    min-width: 200px;
    overflow: hidden;
    display: none;
    border: 1px solid var(--c2);
    z-index: 200;
}

.profile-dropdown.show { display: block; animation: dropDown 0.18s ease; }

@keyframes dropDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.dropdown-header {
    padding: 14px 16px;
    background: var(--c1);
    border-bottom: 1px solid var(--c2);
}

.dropdown-header .d-name { font-weight: 600; font-size: 14px; color: var(--c5); }
.dropdown-header .d-role { font-size: 12px; color: var(--subtext); }

.dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    font-size: 13.5px;
    color: var(--text);
    text-decoration: none;
    transition: background 0.15s;
}

.dropdown-item:hover { background: var(--c1); }
.dropdown-item.danger { color: var(--danger); }
.dropdown-item.danger:hover { background: #fdf0ef; }

/* ── Container ─────────────────────────────────────────────────── */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
}

.container-sm {
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 24px;
}

/* ── Cards ─────────────────────────────────────────────────────── */
.card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(191,234,242,0.5);
}

.card h2 {
    font-family: 'DM Serif Display', serif;
    color: var(--c5);
    font-size: 22px;
    margin-bottom: 4px;
}

.subtitle {
    color: var(--subtext);
    font-size: 13.5px;
    margin-bottom: 28px;
}

/* ── Stats Grid ────────────────────────────────────────────────── */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
}

.stat-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(191,234,242,0.5);
    display: flex;
    align-items: center;
    gap: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

.stat-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
}

.stat-icon.blue   { background: var(--c1); }
.stat-icon.teal   { background: rgba(99,201,214,0.15); }
.stat-icon.orange { background: #fff4e6; }
.stat-icon.green  { background: #eafaf1; }

.stat-value { font-size: 26px; font-weight: 700; color: var(--c5); line-height: 1; }
.stat-label { font-size: 12.5px; color: var(--subtext); margin-top: 3px; }

/* ── Form Elements ─────────────────────────────────────────────── */
.form-group { margin-bottom: 20px; }

label {
    display: block;
    font-weight: 600;
    color: var(--c5);
    margin-bottom: 7px;
    font-size: 13.5px;
}

select, input[type="text"], input[type="email"],
input[type="password"], input[type="number"] {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--c2);
    border-radius: 9px;
    font-size: 14px;
    color: var(--text);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
}

select:focus, input:focus {
    border-color: var(--c4);
    box-shadow: 0 0 0 3px rgba(30,127,140,0.1);
}

/* ── Buttons ───────────────────────────────────────────────────── */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 9px;
    font-size: 14.5px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-decoration: none;
}

.btn-primary {
    background: var(--c4);
    color: white;
    width: 100%;
}

.btn-primary:hover { background: #196e7a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(30,127,140,0.3); }

.btn-outline {
    background: transparent;
    color: var(--c4);
    border: 1.5px solid var(--c4);
    width: 100%;
}

.btn-outline:hover { background: var(--c1); }

/* ── Patient info box ──────────────────────────────────────────── */
#patient-info {
    background: var(--c1);
    border-left: 4px solid var(--c4);
    padding: 14px 18px;
    border-radius: 9px;
    font-size: 13.5px;
    margin-bottom: 22px;
    display: none;
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

#patient-info p { margin: 4px 0; color: var(--text); }
#patient-info strong { color: var(--c4); }

/* ── Result Box ────────────────────────────────────────────────── */
#result {
    margin-top: 24px;
    padding: 20px 22px;
    border-radius: 10px;
    display: none;
    animation: fadeIn 0.3s ease;
}

#result.safe    { background: #eafaf1; border-left: 5px solid var(--success); }
#result.warning { background: #fef9e7; border-left: 5px solid var(--warning); }
#result.danger  { background: #fdf0ef; border-left: 5px solid var(--danger); }

#result h3 { font-size: 15px; margin-bottom: 12px; font-weight: 600; }

.alert-item {
    background: white;
    border-radius: 8px;
    padding: 13px 15px;
    margin-top: 10px;
    font-size: 13.5px;
    border: 1px solid rgba(0,0,0,0.06);
}

.alert-item strong { display: block; margin-bottom: 4px; font-size: 14px; }

/* ── Tables ────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--c2); }

table { width: 100%; border-collapse: collapse; font-size: 13.5px; }

th {
    background: var(--c5);
    color: white;
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.3px;
}

th:first-child { border-radius: 0; }

td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--c1);
    color: var(--text);
    vertical-align: middle;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--c1); }

/* ── Badges ────────────────────────────────────────────────────── */
.badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
}

.badge-safe    { background: #eafaf1; color: #1e8449; }
.badge-danger  { background: #fdf0ef; color: #c0392b; }
.badge-warning { background: #fef9e7; color: #b7770d; }

/* ── Auth Pages ────────────────────────────────────────────────── */
.auth-bg {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--c5) 0%, #1a4a54 50%, var(--c4) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.auth-card {
    background: white;
    border-radius: 18px;
    padding: 44px 40px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

.auth-logo {
    text-align: center;
    margin-bottom: 28px;
}

.auth-logo .logo-icon {
    width: 56px; height: 56px;
    background: var(--c1);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin: 0 auto 12px;
    border: 2px solid var(--c2);
}

.auth-logo h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--c5);
}

.auth-logo p { color: var(--subtext); font-size: 13px; margin-top: 4px; }

.auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--subtext);
    font-size: 12.5px;
}

.auth-divider::before,
.auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--c2);
}

.google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 11px;
    border: 1.5px solid var(--c2);
    border-radius: 9px;
    background: white;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 4px;
}

.google-btn:hover { background: var(--c1); border-color: var(--c3); }

.auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13.5px;
    color: var(--subtext);
}

.auth-footer a { color: var(--c4); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }

.error-msg {
    background: #fdf0ef;
    border: 1px solid #f5c6cb;
    color: var(--danger);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    margin-bottom: 16px;
    display: none;
}

.success-msg {
    background: #eafaf1;
    border: 1px solid #a9dfbf;
    color: var(--success);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    margin-bottom: 16px;
    display: none;
}

/* ── Password toggle ───────────────────────────────────────────── */
.input-wrap { position: relative; }
.input-wrap input { padding-right: 42px; }
.toggle-pw {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--subtext);
    font-size: 16px;
    padding: 0;
    width: auto;
}

/* ── Page header ───────────────────────────────────────────────── */
.page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
}

.page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--c5);
}

.page-header p { color: var(--subtext); font-size: 13.5px; margin-top: 2px; }

/* ── Profile page ──────────────────────────────────────────────── */
.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--c2);
}

.profile-avatar-lg {
    width: 72px; height: 72px;
    background: var(--c4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
}

.profile-info h2 { font-size: 22px; color: var(--c5); }
.profile-info p  { color: var(--subtext); font-size: 13.5px; }

.profile-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--c1);
    color: var(--c4);
    border: 1px solid var(--c2);
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 6px;
}

/* ── Responsive ────────────────────────────────────────────────── */
@media (max-width: 768px) {
    nav { padding: 0 16px; }
    .nav-links a span { display: none; }
    .container { padding: 20px 16px; }
    .card { padding: 20px; }
    .auth-card { padding: 32px 24px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
